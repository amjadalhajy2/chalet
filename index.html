<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الاستراحات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        :root { --main: #1a2a3a; --gold: #c5a059; }
        body { background: #f4f7f6; font-family: sans-serif; }
        .hero { background: var(--main); color: white; padding: 30px 0; border-bottom: 4px solid var(--gold); text-align: center; }
        .calendar-container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-top: -20px; }
        .fc-event { cursor: pointer; border: none !important; font-size: 0.8em; padding: 2px; }
        .status-available { background: #28a745 !important; } /* أخضر */
        .status-booked { background: #dc3545 !important; }    /* أحمر */
        .modal-header { background: var(--main); color: white; }
    </style>
</head>
<body>

<div class="hero">
    <h3>بوابة حجز الاستراحات</h3>
    <p class="small">اختر التاريخ والاستراحة المطلوبة</p>
</div>

<div class="container mb-5">
    <div class="calendar-container">
        <div id="calendar"></div>
    </div>
</div>

<div class="modal fade" id="bookModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h6 class="modal-title">طلب حجز جديد</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form id="bookForm">
                <div class="modal-body">
                    <div id="targetInfo" class="alert alert-secondary py-2 small fw-bold"></div>
                    <input type="hidden" id="resort"><input type="hidden" id="date">
                    <input type="text" id="name" class="form-control mb-3" placeholder="اسم العميل" required>
                    <input type="tel" id="phone" class="form-control mb-3" placeholder="رقم الهاتف" required>
                    <select id="stay" class="form-select mb-2"><option value="بدون مبيت">بدون مبيت</option><option value="مع مبيت">مع مبيت</option></select>
                </div>
                <div class="modal-footer"><button type="submit" id="subBtn" class="btn btn-dark w-100">تأكيد الطلب</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyfYgfKoIxtCfeCpDUIKTwJLcyM3qJ0MXvgyBQUvasqEO0wdFuHEj70sp1ffTUSp8kiGQ/exec';
    const RESORTS = ["استراحة النسيم", "استراحة الجبل", "استراحة الشاطئ"];

    document.addEventListener('DOMContentLoaded', async function() {
        const modal = new bootstrap.Modal(document.getElementById('bookModal'));
        let booked = [];

        // جلب البيانات بسرعة
        try {
            const res = await fetch(scriptURL);
            booked = await res.json();
        } catch(e) {}

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'ar',
            direction: 'rtl',
            height: 'auto',
            events: function(info, success) {
                let evs = [];
                let start = new Date(info.start);
                while(start < info.end) {
                    let d = start.toISOString().split('T')[0];
                    RESORTS.forEach(r => {
                        let isB = booked.some(row => row[4] === d && row[3] === r && row[6] === "Confirmed");
                        evs.push({ title: r + (isB ? " (محجوز)" : " (متاح)"), start: d, className: isB ? 'status-booked' : 'status-available', extendedProps: {r, d, isB} });
                    });
                    start.setDate(start.getDate() + 1);
                }
                success(evs);
            },
            eventClick: function(info) {
                if(info.event.extendedProps.isB) return alert("محجوز مسبقاً");
                document.getElementById('resort').value = info.event.extendedProps.r;
                document.getElementById('date').value = info.event.extendedProps.d;
                document.getElementById('targetInfo').innerText = info.event.extendedProps.r + " | " + info.event.extendedProps.d;
                modal.show();
            }
        });
        calendar.render();

        document.getElementById('bookForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "جاري الحجز...";
            
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                resort: document.getElementById('resort').value,
                date: document.getElementById('date').value,
                stayType: document.getElementById('stay').value
            };

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("تم إرسال طلبك بنجاح!");
            location.reload();
        };
    });
</script>
</body>
</html>
