<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الاستراحات الفاخرة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        :root { --primary-gold: #c5a059; --dark-blue: #1a2a3a; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--dark-blue); border-bottom: 3px solid var(--primary-gold); }
        #calendar { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: var(--primary-gold); border: none; }
        .btn-primary:hover { background-color: #a38445; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container justify-content-center">
        <span class="navbar-brand mb-0 h1">بوابة حجز استراحاتنا</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-8 mb-4">
            <div id="calendar"></div>
        </div>
        
        <div class="col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title mb-4 text-center">طلب حجز جديد</h5>
                    <form id="bookingForm">
                        <div class="mb-3">
                            <label class="form-label">الاستراحة</label>
                            <select id="resort" class="form-select" required>
                                <option value="استراحة النسيم">استراحة النسيم</option>
                                <option value="استراحة الجبل">استراحة الجبل</option>
                                <option value="استراحة الشاطئ">استراحة الشاطئ</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">التاريخ المختار</label>
                            <input type="text" id="selectedDate" class="form-control" readonly required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">نوع الإقامة</label>
                            <select id="stayType" class="form-select">
                                <option value="بدون مبيت">يوم كامل (بدون مبيت)</option>
                                <option value="مع مبيت">يوم كامل (مع مبيت)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="text" id="name" class="form-control" placeholder="اسم العميل" required>
                        </div>
                        <div class="mb-3">
                            <input type="tel" id="phone" class="form-control" placeholder="رقم الهاتف" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">إرسال طلب الحجز</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ar',
            selectable: true,
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            dateClick: function(info) {
                document.getElementById('selectedDate').value = info.dateStr;
            }
        });
        calendar.render();

        // ربط النموذج بـ Google Sheets
        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                resort: document.getElementById('resort').value,
                date: document.getElementById('selectedDate').value,
                stayType: document.getElementById('stayType').value
            };

            // استبدل الرابط أدناه برابط الـ Web App الخاص بك
            fetch('YOUR_GOOGLE_SCRIPT_URL', {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(res => {
                alert('تم إرسال طلبك بنجاح! سنتواصل معك للتأكيد.');
                document.getElementById('bookingForm').reset();
            });
        };
    });
</script>
</body>
</html>
