<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز الاستراحات | الفخامة والراحة</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-blue: #1a2a3a;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            color: var(--dark-blue);
        }

        .navbar {
            background-color: var(--dark-blue);
            border-bottom: 4px solid var(--primary-gold);
            padding: 1rem 0;
        }

        .calendar-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: -50px;
        }

        /* تنسيق أحداث التقويم */
        .fc-event {
            padding: 3px 8px;
            margin: 2px 0;
            border: none !important;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fc-event:hover { transform: scale(1.02); }
        
        .status-available { background-color: #28a745 !important; color: white; } /* متاح - أخضر */
        .status-booked { background-color: #dc3545 !important; color: white; opacity: 0.7; } /* محجوز - أحمر */

        .header-section {
            background: var(--dark-blue);
            height: 200px;
            color: white;
            padding-top: 30px;
            text-align: center;
        }

        .modal-header {
            background: var(--dark-blue);
            color: white;
            border-bottom: 3px solid var(--primary-gold);
        }

        .btn-primary {
            background-color: var(--primary-gold);
            border: none;
            font-weight: bold;
        }

        .btn-primary:hover { background-color: #a38445; }
    </style>
</head>
<body>

<div class="header-section">
    <h1>استراحاتنا المتميزة</h1>
    <p>اختر استراحتك المفضلة وقم بالحجز مباشرة من التقويم</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-11 calendar-container">
            <div class="d-flex justify-content-center gap-3 mb-4">
                <span><span class="badge status-available">●</span> متاح للحجز</span>
                <span><span class="badge status-booked">●</span> محجوز مسبقاً</span>
            </div>
            
            <div id="calendar"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">طلب حجز</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="bookingForm">
                <div class="modal-body">
                    <div id="resortDetails" class="alert alert-warning text-center fw-bold"></div>
                    
                    <input type="hidden" id="selectedDate">
                    <input type="hidden" id="selectedResort">

                    <div class="mb-3">
                        <label class="form-label">الاسم الكامل</label>
                        <input type="text" id="custName" class="form-control" required placeholder="مثال: أحمد محمد">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="tel" id="custPhone" class="form-control" required placeholder="968XXXXXXXX">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">نوع الإقامة</label>
                        <select id="stayType" class="form-select">
                            <option value="بدون مبيت">يوم كامل (بدون مبيت)</option>
                            <option value="مع مبيت">يوم كامل (مع مبيت)</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary w-100" id="btnSubmit">تأكيد إرسال الطلب</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    // 1. إعدادات النظام
    const scriptURL = 'https://script.google.com/macros/s/AKfycby53O6hl3gW0HuZ3NWMbn8_Gokp_4aJ4KYCijm_T-ajJouKAW6KfkscDvYqRrR7AnZKVA/exec';
    const RESORTS = ["استراحة النسيم", "استراحة الجبل", "استراحة الشاطئ"];
    
    let bookedDates = []; // سيتم ملؤها من الشيت

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));

        // جلب الحجوزات الحالية من جوجل شيت (اختياري لكن مفيد للتحديث)
        async function fetchBookings() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                // نفترض أن الداتا ترجع التاريخ في العمود 4 والاستراحة في العمود 3 والحالة في العمود 6
                bookedDates = data.filter(row => row[6] === "Confirmed").map(row => ({
                    date: row[4],
                    resort: row[3]
                }));
            } catch (e) { console.log("تحميل الحجوزات متاح عند نشر الـ Script"); }
        }

        await fetchBookings();

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ar',
            direction: 'rtl',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            events: function(fetchInfo, successCallback) {
                let events = [];
                let curr = new Date(fetchInfo.start);
                let stop = new Date(fetchInfo.end);

                while(curr < stop) {
                    let dStr = curr.toISOString().split('T')[0];
                    RESORTS.forEach(res => {
                        let isBooked = bookedDates.some(b => b.date.includes(dStr) && b.resort === res);
                        events.push({
                            title: res + (isBooked ? " (محجوز)" : " (متاح)"),
                            start: dStr,
                            className: isBooked ? 'status-booked' : 'status-available',
                            extendedProps: { resort: res, date: dStr, isBooked: isBooked }
                        });
                    });
                    curr.setDate(curr.getDate() + 1);
                }
                successCallback(events);
            },
            eventClick: function(info) {
                if(info.event.extendedProps.isBooked) {
                    alert("نعتذر، هذه الاستراحة محجوزة في هذا التاريخ");
                    return;
                }
                
                document.getElementById('selectedDate').value = info.event.extendedProps.date;
                document.getElementById('selectedResort').value = info.event.extendedProps.resort;
                document.getElementById('resortDetails').innerText = `${info.event.extendedProps.resort} - تاريخ: ${info.event.extendedProps.date}`;
                bookingModal.show();
            }
        });

        calendar.render();

        // إرسال الحجز
        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            const payload = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                resort: document.getElementById('selectedResort').value,
                date: document.getElementById('selectedDate').value,
                stayType: document.getElementById('stayType').value
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("تم استلام طلبك! سنقوم بالتواصل معك لتأكيد الحجز.");
                bookingModal.hide();
                document.getElementById('bookingForm').reset();
            })
            .catch(err => alert("حدث خطأ، يرجى المحاولة لاحقاً"))
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "تأكيد إرسال الطلب";
            });
        };
    });
</script>

</body>
</html>
