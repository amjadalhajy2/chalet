<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حجز الاستراحات</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: #f5f7fb;
  text-align: center;
}
#calendar {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}
form {
  display: none;
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  border-radius: 10px;
}
input, select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}
button {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>احجز استراحتك الآن</h2>

<div id="calendar"></div>

<form id="bookingForm">
  <h3>تفاصيل الحجز</h3>
  <input type="hidden" id="date">

  <select id="chalet">
    <option>استراحة 1</option>
    <option>استراحة 2</option>
    <option>استراحة 3</option>
  </select>

  <select id="type">
    <option>مبيت</option>
    <option>بدون مبيت</option>
  </select>

  <input type="text" id="name" placeholder="اسم العميل">
  <input type="text" id="phone" placeholder="رقم الهاتف">

  <button type="submit">إرسال الحجز</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const SCRIPT_URL = "ضع رابط Apps Script هنا";

document.addEventListener('DOMContentLoaded', function() {
  var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    dateClick: function(info) {
      document.getElementById('bookingForm').style.display = 'block';
      document.getElementById('date').value = info.dateStr;
    }
  });

  calendar.render();
});

document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      date: document.getElementById("date").value,
      chalet: document.getElementById("chalet").value,
      type: document.getElementById("type").value,
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value
    })
  })
  .then(res => res.text())
  .then(res => {
    if (res == "Booked") {
      alert("هذا التاريخ محجوز!");
    } else {
      alert("تم إرسال طلبك");
    }
  });
});
</script>

</body>
</html>
